<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <title>Mol* Overlay Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
      #app { position: absolute; inset: 0; }
      #status {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 2;
        max-width: min(760px, calc(100% - 24px));
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.58);
        color: #e2e8f0;
        font: 12px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 8px 10px;
        backdrop-filter: blur(10px);
        transition: opacity 180ms ease;
      }
      #status[data-hidden="1"] { opacity: 0; pointer-events: none; }
      #status[data-error="1"] { background: rgba(127, 29, 29, 0.72); color: #fee2e2; }
    </style>
    <link rel="stylesheet" type="text/css" href="./molstar.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="status">Preparing overlay...</div>
    <script type="text/javascript" src="./molstar.js"></script>
    <script type="text/javascript">
      (function () {
        var MESSAGE_TYPE = 'splice-playground-molstar-overlay';
        var DEFAULT_PRIMARY_COLOR = 0x22c55e;
        var DEFAULT_SECONDARY_COLOR = 0xef4444;
        var AA3_TO_1 = {
          ALA: 'A', ARG: 'R', ASN: 'N', ASP: 'D', CYS: 'C', GLN: 'Q', GLU: 'E', GLY: 'G',
          HIS: 'H', ILE: 'I', LEU: 'L', LYS: 'K', MET: 'M', PHE: 'F', PRO: 'P', SER: 'S',
          THR: 'T', TRP: 'W', TYR: 'Y', VAL: 'V', MSE: 'M', SEC: 'U', PYL: 'O', ASX: 'B',
          GLX: 'Z', XLE: 'J', UNK: 'X'
        };

        function getParam(name) {
          return new URLSearchParams(window.location.search || '').get(name) || '';
        }

        function getBoolParam(name) {
          return getParam(name).trim() === '1';
        }

        function parseColor(value, fallback) {
          var parsed = Number(value);
          return Number.isFinite(parsed) ? parsed : fallback;
        }

        function post(status, payload) {
          var message = Object.assign({
            type: MESSAGE_TYPE,
            signature: getParam('signature'),
            status: status
          }, payload || {});
          window.parent && window.parent.postMessage(message, '*');
        }

        function setStatus(text, isError, hideSoon) {
          var el = document.getElementById('status');
          if (!el) return;
          el.textContent = text;
          el.dataset.error = isError ? '1' : '0';
          el.dataset.hidden = '0';
          if (hideSoon) {
            window.setTimeout(function () {
              el.dataset.hidden = '1';
            }, 1600);
          }
        }

        function structureInput(prefix, fallbackLabel, fallbackColor) {
          return {
            url: getParam(prefix + '-url'),
            format: (getParam(prefix + '-format') || 'mmcif').toLowerCase(),
            label: getParam(prefix + '-label') || fallbackLabel,
            chainId: getParam(prefix + '-chain') || '',
            color: parseColor(getParam(prefix + '-color'), fallbackColor),
            isBinary: getBoolParam(prefix + '-is-binary')
          };
        }

        function resolveStructureData(structureCell) {
          return structureCell && (
            structureCell.cell && structureCell.cell.obj && structureCell.cell.obj.data ||
            structureCell.obj && structureCell.obj.data ||
            structureCell.data ||
            null
          );
        }

        async function loadStructure(plugin, input) {
          if (!input.url) throw new Error('structure URL is missing');
          var data = await plugin.builders.data.download(
            { url: input.url, isBinary: input.isBinary, label: input.label || undefined },
            { state: { isGhost: true } }
          );
          var trajectory = await plugin.builders.structure.parseTrajectory(data, input.format || 'mmcif');
          var model = await plugin.builders.structure.createModel(trajectory);
          var structure = await plugin.builders.structure.createStructure(model);
          return { data: data, trajectory: trajectory, model: model, structure: structure };
        }

        function safeString(value) {
          return value == null ? '' : String(value).trim();
        }

        function collectCaResidues(structureCell, preferredChainId) {
          var lib = window.molstar && window.molstar.lib;
          var structureLib = lib && lib.structure;
          if (!structureLib) throw new Error('Mol* structure library is unavailable in overlay viewer');

          var StructureElement = structureLib.StructureElement;
          var StructureProperties = structureLib.StructureProperties;
          var Unit = structureLib.Unit;
          var structure = resolveStructureData(structureCell);
          if (!structure) throw new Error('loaded structure data is unavailable');

          var preferred = safeString(preferredChainId);
          var chains = new Map();
          var loc = StructureElement.Location.create(structure);
          var order = 0;

          for (var unitIndex = 0; unitIndex < structure.units.length; unitIndex += 1) {
            var unit = structure.units[unitIndex];
            if (!Unit.isAtomic(unit)) continue;
            loc.structure = structure;
            loc.unit = unit;

            for (var i = 0; i < unit.elements.length; i += 1) {
              loc.element = unit.elements[i];
              var atomName = safeString(
                StructureProperties.atom.label_atom_id(loc) || StructureProperties.atom.auth_atom_id(loc)
              ).toUpperCase();
              if (atomName !== 'CA') continue;

              var authChain = safeString(StructureProperties.chain.auth_asym_id(loc));
              var labelChain = safeString(StructureProperties.chain.label_asym_id(loc));
              if (preferred && authChain !== preferred && labelChain !== preferred) continue;

              var chainKey = authChain || labelChain || 'chain';
              var labelSeq = Number(StructureProperties.residue.label_seq_id(loc));
              var authSeq = Number(StructureProperties.residue.auth_seq_id(loc));
              var seqId = Number.isFinite(labelSeq) ? labelSeq : (Number.isFinite(authSeq) ? authSeq : order);
              var comp = safeString(StructureProperties.residue.label_comp_id(loc) || StructureProperties.atom.label_comp_id(loc)).toUpperCase();
              var aa = AA3_TO_1[comp] || 'X';
              var residueKey = [chainKey, seqId, safeString(StructureProperties.residue.pdbx_PDB_ins_code(loc))].join(':');

              if (!chains.has(chainKey)) chains.set(chainKey, { chainId: chainKey, residues: [], seen: new Set() });
              var group = chains.get(chainKey);
              if (group.seen.has(residueKey)) continue;
              group.seen.add(residueKey);
              group.residues.push({
                aa: aa,
                seqId: seqId,
                order: order,
                x: StructureProperties.atom.x(loc),
                y: StructureProperties.atom.y(loc),
                z: StructureProperties.atom.z(loc)
              });
              order += 1;
            }
          }

          var candidates = Array.from(chains.values()).map(function (group) {
            group.residues.sort(function (a, b) {
              return a.seqId === b.seqId ? a.order - b.order : a.seqId - b.seqId;
            });
            return group;
          }).filter(function (group) { return group.residues.length > 0; });

          if (!candidates.length) throw new Error('no C-alpha residues found for overlay alignment');
          candidates.sort(function (a, b) { return b.residues.length - a.residues.length; });
          return candidates[0];
        }

        function alignResidues(a, b) {
          var n = a.length;
          var m = b.length;
          if (n < 3 || m < 3) return [];
          if ((n + 1) * (m + 1) > 6000000) {
            var len = Math.min(n, m);
            var fallbackPairs = [];
            for (var f = 0; f < len; f += 1) fallbackPairs.push([f, f]);
            return fallbackPairs;
          }

          var trace = new Uint8Array((n + 1) * (m + 1));
          var prev = new Float64Array(m + 1);
          var curr = new Float64Array(m + 1);
          var gap = -2;

          for (var j = 1; j <= m; j += 1) {
            prev[j] = prev[j - 1] + gap;
            trace[j] = 3;
          }

          for (var i = 1; i <= n; i += 1) {
            curr[0] = prev[0] + gap;
            trace[i * (m + 1)] = 2;
            for (var jj = 1; jj <= m; jj += 1) {
              var diag = prev[jj - 1] + (a[i - 1].aa === b[jj - 1].aa ? 2 : -1);
              var up = prev[jj] + gap;
              var left = curr[jj - 1] + gap;
              var code = 1;
              var best = diag;
              if (up > best) { best = up; code = 2; }
              if (left > best) { best = left; code = 3; }
              curr[jj] = best;
              trace[i * (m + 1) + jj] = code;
            }
            var swap = prev;
            prev = curr;
            curr = swap;
          }

          var pairs = [];
          var ii = n;
          var kk = m;
          while (ii > 0 || kk > 0) {
            var action = trace[ii * (m + 1) + kk];
            if (ii > 0 && kk > 0 && action === 1) {
              pairs.push([ii - 1, kk - 1]);
              ii -= 1;
              kk -= 1;
            } else if (ii > 0 && (action === 2 || kk === 0)) {
              ii -= 1;
            } else if (kk > 0) {
              kk -= 1;
            } else {
              break;
            }
          }
          pairs.reverse();
          return pairs;
        }

        function centroid(points) {
          var c = [0, 0, 0];
          for (var i = 0; i < points.length; i += 1) {
            c[0] += points[i][0];
            c[1] += points[i][1];
            c[2] += points[i][2];
          }
          c[0] /= points.length;
          c[1] /= points.length;
          c[2] /= points.length;
          return c;
        }

        function normalize4(v) {
          var n = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2] + v[3] * v[3]) || 1;
          return [v[0] / n, v[1] / n, v[2] / n, v[3] / n];
        }

        function computeSuperposition(targetPoints, mobilePoints) {
          var n = targetPoints.length;
          var ct = centroid(targetPoints);
          var cm = centroid(mobilePoints);
          var sxx = 0, sxy = 0, sxz = 0, syx = 0, syy = 0, syz = 0, szx = 0, szy = 0, szz = 0;

          for (var i = 0; i < n; i += 1) {
            var px = mobilePoints[i][0] - cm[0];
            var py = mobilePoints[i][1] - cm[1];
            var pz = mobilePoints[i][2] - cm[2];
            var qx = targetPoints[i][0] - ct[0];
            var qy = targetPoints[i][1] - ct[1];
            var qz = targetPoints[i][2] - ct[2];
            sxx += px * qx; sxy += px * qy; sxz += px * qz;
            syx += py * qx; syy += py * qy; syz += py * qz;
            szx += pz * qx; szy += pz * qy; szz += pz * qz;
          }

          var K = [
            sxx + syy + szz, syz - szy, szx - sxz, sxy - syx,
            syz - szy, sxx - syy - szz, sxy + syx, szx + sxz,
            szx - sxz, sxy + syx, -sxx + syy - szz, syz + szy,
            sxy - syx, szx + sxz, syz + szy, -sxx - syy + szz
          ];

          var q = [1, 0, 0, 0];
          for (var iter = 0; iter < 60; iter += 1) {
            q = normalize4([
              K[0] * q[0] + K[1] * q[1] + K[2] * q[2] + K[3] * q[3],
              K[4] * q[0] + K[5] * q[1] + K[6] * q[2] + K[7] * q[3],
              K[8] * q[0] + K[9] * q[1] + K[10] * q[2] + K[11] * q[3],
              K[12] * q[0] + K[13] * q[1] + K[14] * q[2] + K[15] * q[3]
            ]);
          }

          var w = q[0], x = q[1], y = q[2], z = q[3];
          var r00 = w*w + x*x - y*y - z*z;
          var r01 = 2 * (x*y - w*z);
          var r02 = 2 * (x*z + w*y);
          var r10 = 2 * (x*y + w*z);
          var r11 = w*w - x*x + y*y - z*z;
          var r12 = 2 * (y*z - w*x);
          var r20 = 2 * (x*z - w*y);
          var r21 = 2 * (y*z + w*x);
          var r22 = w*w - x*x - y*y + z*z;
          var tx = ct[0] - (r00 * cm[0] + r01 * cm[1] + r02 * cm[2]);
          var ty = ct[1] - (r10 * cm[0] + r11 * cm[1] + r12 * cm[2]);
          var tz = ct[2] - (r20 * cm[0] + r21 * cm[1] + r22 * cm[2]);

          var distances = [];
          var sumSquares = 0;
          for (var d = 0; d < n; d += 1) {
            var mp = mobilePoints[d];
            var xp = r00 * mp[0] + r01 * mp[1] + r02 * mp[2] + tx;
            var yp = r10 * mp[0] + r11 * mp[1] + r12 * mp[2] + ty;
            var zp = r20 * mp[0] + r21 * mp[1] + r22 * mp[2] + tz;
            var dx = xp - targetPoints[d][0];
            var dy = yp - targetPoints[d][1];
            var dz = zp - targetPoints[d][2];
            var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
            distances.push(dist);
            sumSquares += dist * dist;
          }

          return {
            matrix: [r00, r10, r20, 0, r01, r11, r21, 0, r02, r12, r22, 0, tx, ty, tz, 1],
            rmsd: Math.sqrt(sumSquares / n),
            distances: distances
          };
        }

        function tmLikeScore(distances, normalizingLength) {
          var L = Math.max(Number(normalizingLength) || distances.length || 1, 1);
          var d0 = L > 21 ? Math.max(0.5, 1.24 * Math.cbrt(L - 15) - 1.8) : 0.5;
          var score = 0;
          for (var i = 0; i < distances.length; i += 1) {
            var ratio = distances[i] / d0;
            score += 1 / (1 + ratio * ratio);
          }
          return score / L;
        }

        async function applyTransform(plugin, structureCell, matrix) {
          var transforms = window.molstar && window.molstar.lib && window.molstar.lib.plugin && window.molstar.lib.plugin.StateTransforms;
          if (!transforms || !transforms.Model || !transforms.Model.TransformStructureConformation) return structureCell;
          var update = plugin.state.data.build().to(structureCell).insert(transforms.Model.TransformStructureConformation, {
            transform: { name: 'matrix', params: { data: matrix, transpose: false } }
          });
          var selector = update.selector || structureCell;
          await plugin.runTask(plugin.state.data.updateTree(update));
          return selector;
        }

        async function addCartoon(plugin, structureCell, label, color) {
          var target = structureCell;
          try {
            var component = await plugin.builders.structure.tryCreateComponentStatic(structureCell, 'polymer', { label: label });
            target = component || structureCell;
          } catch (e) {
            target = structureCell;
          }
          await plugin.builders.structure.representation.addRepresentation(target, {
            type: 'cartoon',
            color: 'uniform',
            colorParams: { value: color }
          });
        }

        async function main() {
          var primary = structureInput('primary', 'Normal Structure', DEFAULT_PRIMARY_COLOR);
          var secondary = structureInput('secondary', 'User Structure', DEFAULT_SECONDARY_COLOR);
          if (!primary.url || !secondary.url) throw new Error('normal/user structure URL is missing');

          var hideControls = getBoolParam('hide-controls');
          var collapseLeftPanel = getBoolParam('collapse-left-panel');
          var viewportShowToggleFullscreen = getBoolParam('show-toggle-fullscreen');

          var viewer = await molstar.Viewer.create('app', {
            disabledExtensions: [],
            layoutShowControls: !hideControls,
            viewportShowExpand: false,
            viewportShowToggleFullscreen: viewportShowToggleFullscreen,
            collapseLeftPanel: collapseLeftPanel,
            powerPreference: 'high-performance',
            resolutionMode: 'auto'
          });
          var plugin = viewer.plugin;
          window.addEventListener('unload', function () { viewer.dispose(); });

          setStatus('Loading structures...', false, false);
          await plugin.clear();
          var primaryLoaded = await loadStructure(plugin, primary);
          var secondaryLoaded = await loadStructure(plugin, secondary);

          setStatus('Aligning C-alpha traces...', false, false);
          var primaryChain = collectCaResidues(primaryLoaded.structure, primary.chainId);
          var secondaryChain = collectCaResidues(secondaryLoaded.structure, secondary.chainId);
          var pairs = alignResidues(primaryChain.residues, secondaryChain.residues);

          var comparison = {
            method: 'unavailable',
            tm_score_1: null,
            tm_score_2: null,
            rmsd: null,
            aligned_length: 0,
            note: 'C-alpha alignment was not available in the static Mol* overlay viewer.'
          };
          var secondaryForDisplay = secondaryLoaded.structure;

          if (pairs.length >= 3) {
            var targetPoints = [];
            var mobilePoints = [];
            for (var i = 0; i < pairs.length; i += 1) {
              var pr = primaryChain.residues[pairs[i][0]];
              var sr = secondaryChain.residues[pairs[i][1]];
              targetPoints.push([pr.x, pr.y, pr.z]);
              mobilePoints.push([sr.x, sr.y, sr.z]);
            }
            var fit = computeSuperposition(targetPoints, mobilePoints);
            secondaryForDisplay = await applyTransform(plugin, secondaryLoaded.structure, fit.matrix);
            comparison = {
              method: 'sequence-align',
              tm_score_1: tmLikeScore(fit.distances, primaryChain.residues.length),
              tm_score_2: tmLikeScore(fit.distances, secondaryChain.residues.length),
              rmsd: fit.rmsd,
              aligned_length: pairs.length,
              note: 'Vercel-safe static Mol* overlay: sequence-aligned C-alpha Kabsch superposition.'
            };
          }

          await addCartoon(plugin, primaryLoaded.structure, primary.label || 'Normal Structure', primary.color);
          await addCartoon(plugin, secondaryForDisplay, secondary.label || 'User Structure', secondary.color);

          try {
            plugin.managers.camera.reset && plugin.managers.camera.reset();
          } catch (e) {}

          post('comparison', { comparison: comparison });
          setStatus('Overlay ready', false, true);
        }

        main().catch(function (error) {
          var message = error && error.message ? error.message : 'Mol* overlay viewer failed to initialize.';
          setStatus(message, true, false);
          post('error', { message: message });
          console.error(error);
        });
      })();
    </script>
  </body>
</html>
